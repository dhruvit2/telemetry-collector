---
- name: Install system dependencies
  apt:
    name:
      - curl
      - wget
      - ca-certificates
      - openssl
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  become: yes

- name: Install dependencies on RedHat systems
  yum:
    name:
      - curl
      - wget
      - ca-certificates
      - openssl
    state: present
  when: ansible_os_family == "RedHat"
  become: yes

- name: Create telemetry group
  group:
    name: telemetry
    state: present
  become: yes

- name: Create telemetry user
  user:
    name: telemetry
    group: telemetry
    groups: telemetry
    shell: /bin/bash
    createhome: yes
    home: /opt/telemetry
    state: present
  become: yes

- name: Create application directories
  file:
    path: "{{ item }}"
    state: directory
    owner: telemetry
    group: telemetry
    mode: '0755'
  loop:
    - /opt/telemetry/bin
    - /opt/telemetry/config
    - /opt/telemetry/logs
    - /etc/telemetry-collector
  become: yes

- name: Create systemd service directory
  file:
    path: /etc/systemd/system
    state: directory
    mode: '0755'
  become: yes
