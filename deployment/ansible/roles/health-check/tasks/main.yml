---
- name: Check if service is running
  systemd:
    name: telemetry-collector
    state: started
  become: yes
  register: service_status

- name: Wait for service to be ready
  uri:
    url: "http://localhost:{{ health_port }}/ready"
    method: GET
    status_code: 200
  register: readiness_check
  retries: 5
  delay: 2
  until: readiness_check.status == 200
  ignore_errors: yes

- name: Check service health endpoint
  uri:
    url: "http://localhost:{{ health_port }}/health"
    method: GET
    status_code: 200
  register: health_check
  retries: 3
  delay: 2
  until: health_check.status == 200
  ignore_errors: yes

- name: Retrieve service metrics
  uri:
    url: "http://localhost:{{ health_port }}/metrics"
    method: GET
    status_code: 200
    return_content: yes
  register: metrics_response
  ignore_errors: yes

- name: Display health check results
  debug:
    msg:
      - "Service Status: {{ service_status.status.ActiveState }}"
      - "Readiness Status: {{ 'READY' if readiness_check.status == 200 else 'NOT READY' }}"
      - "Health Status: {{ 'HEALTHY' if health_check.status == 200 else 'UNHEALTHY' }}"
      - "Current Metrics: {{ metrics_response.content | default('Unable to retrieve metrics') }}"

- name: Check service logs for errors
  command: journalctl -u telemetry-collector -n 20 --no-pager
  become: yes
  register: service_logs
  ignore_errors: yes

- name: Display recent logs
  debug:
    msg: "{{ service_logs.stdout_lines }}"
  when: service_logs.stdout_lines is defined

- name: Perform connectivity test
  shell: |
    curl -s -X GET http://localhost:{{ health_port }}/metrics | head -20
  register: connectivity_test
  ignore_errors: yes

- name: Display connectivity result
  debug:
    msg: "{{ connectivity_test.stdout_lines }}"
  when: connectivity_test.stdout_lines is defined
